<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服装加工厂计件管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header .current-date {
            font-size: 14px;
            opacity: 0.9;
        }

        .tab-nav {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .tab-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .content {
            padding: 30px;
            max-height: calc(100vh - 180px);
            overflow-y: auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-section h2::before {
            content: '📝';
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .wage-display {
            background: linear-gradient(135deg, #2ed573 0%, #26af61 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(46, 213, 115, 0.3);
        }

        .amount-display {
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            text-align: center;
        }

        .stat-card.wage {
            background: linear-gradient(135deg, #2ed573 0%, #26af61 100%);
            box-shadow: 0 10px 30px rgba(46, 213, 115, 0.3);
        }

        .stat-card h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card .stat-value {
            font-size: 28px;
            font-weight: 700;
        }

        /* 公司拿货区样式 */
        .company-section {
            background: #e3f2fd;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 2px solid #2196f3;
        }

        .company-section h2 {
            color: #1976d2;
            margin-bottom: 20px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .company-section h2::before {
            content: '🏢';
        }

        .company-section .form-group input:focus,
        .company-section .form-group select:focus {
            border-color: #2196f3;
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
        }

        .company-section .btn-submit {
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
        }

        .company-section .btn-submit:hover {
            box-shadow: 0 10px 20px rgba(33, 150, 243, 0.3);
        }

        .company-stat-card {
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(33, 150, 243, 0.3);
            text-align: center;
        }

        .company-stat-card h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .company-stat-card .stat-value {
            font-size: 28px;
            font-weight: 700;
        }

        .company-total-cell {
            color: #2196f3;
            font-weight: 600;
        }

        .company-price-cell {
            color: #1976d2;
            font-weight: 500;
        }

        .table-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .table-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-section h2::before {
            content: '📊';
        }

        .table-wrapper {
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .company-table thead {
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
        }

        th, td {
            padding: 15px;
            text-align: left;
            white-space: nowrap;
        }

        th {
            font-weight: 600;
            font-size: 13px;
        }

        td {
            border-bottom: 1px solid #e0e0e0;
        }

        .wage-cell {
            color: #2ed573;
            font-weight: 600;
        }

        .unit-price-cell {
            color: #667eea;
            font-weight: 500;
        }

        tbody tr:hover {
            background: #f5f5f5;
        }

        .btn-delete {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: #ee3344;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .btn-export,
        .btn-backup,
        .btn-restore,
        .btn-import,
        .btn-clear {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .btn-export {
            background: #2ed573;
            color: white;
        }

        .btn-export:hover {
            background: #26c565;
        }

        .btn-backup {
            background: #3498db;
            color: white;
        }

        .btn-backup:hover {
            background: #2980b9;
        }

        .btn-restore {
            background: #e67e22;
            color: white;
        }

        .btn-restore:hover {
            background: #d35400;
        }

        .btn-import {
            background: #9b59b6;
            color: white;
        }

        .btn-import:hover {
            background: #8e44ad;
        }

        .btn-clear {
            background: #ff4757;
            color: white;
        }

        .btn-clear:hover {
            background: #ee3344;
        }

        .company-action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .btn-export-company {
            background: #2196f3;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-export-company:hover {
            background: #1976d2;
        }

        .btn-clear-company {
            background: #ff4757;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-clear-company:hover {
            background: #ee3344;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state::before {
            content: '📭';
            display: block;
            font-size: 48px;
            margin-bottom: 10px;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2ed573;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            background: #ff4757;
        }

        .worker-stats,
        .company-stats-detail {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .worker-stats h3,
        .company-stats-detail h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .worker-stat-item,
        .company-stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .worker-stat-item:last-child,
        .company-stat-item:last-child {
            border-bottom: none;
        }

        .worker-name,
        .company-task-name {
            color: #555;
            font-weight: 500;
        }

        .worker-details,
        .company-task-details {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .worker-total {
            font-weight: 600;
            color: #667eea;
        }

        .worker-wage {
            font-weight: 600;
            color: #2ed573;
        }

        .company-task-quantity {
            font-weight: 600;
            color: #2196f3;
        }

        .company-task-amount {
            font-weight: 600;
            color: #1976d2;
        }

        .task-stats {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .task-stats h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .task-stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .task-stat-item:last-child {
            border-bottom: none;
        }

        .task-type {
            color: #555;
            font-weight: 500;
        }

        .task-details {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .task-total {
            font-weight: 600;
            color: #667eea;
        }

        .task-wage {
            font-weight: 600;
            color: #2ed573;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                border-radius: 15px;
            }

            .content {
                padding: 20px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .header .current-date {
                font-size: 12px;
            }

            /* 标签页导航 */
            .tab-nav {
                gap: 8px;
            }

            .tab-btn {
                padding: 10px 20px;
                font-size: 14px;
                flex: 1;
            }

            /* 内容区高度 */
            .content {
                max-height: calc(100vh - 150px);
            }

            /* 表单单列布局 */
            .form-row {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            /* 输入框增大，防止iOS缩放 */
            .form-group input,
            .form-group select {
                font-size: 16px;
                padding: 15px;
            }

            .form-group label {
                font-size: 14px;
            }

            /* 工资显示 */
            .wage-display,
            .amount-display {
                font-size: 20px;
                padding: 18px;
            }

            /* 提交按钮 */
            .btn-submit {
                padding: 18px;
                font-size: 18px;
            }

            /* 统计卡片单列 */
            .stats-section {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .stat-card {
                padding: 20px;
            }

            .stat-card .stat-value,
            .company-stat-card .stat-value {
                font-size: 24px;
            }

            /* 单价配置 */
            .price-config-row {
                flex-direction: column;
            }

            .price-config-row .form-group {
                width: 100%;
            }

            .btn-save-price {
                width: 100%;
                padding: 15px;
            }

            /* 表格优化 */
            .table-section {
                padding: 15px;
            }

            .table-wrapper {
                max-height: 350px;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px 8px;
            }

            /* 操作按钮网格布局 */
            .action-buttons {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .company-action-buttons {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .btn-export,
            .btn-backup,
            .btn-restore,
            .btn-import,
            .btn-clear,
            .btn-export-company,
            .btn-clear-company {
                width: 100%;
                padding: 16px;
                font-size: 16px;
            }

            /* 统计详情 */
            .worker-stat-item,
            .task-stat-item,
            .company-stat-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }

            .worker-details,
            .task-details,
            .company-task-details {
                width: 100%;
                justify-content: space-between;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 18px;
            }

            .stat-card .stat-value {
                font-size: 20px;
            }

            table {
                font-size: 11px;
            }

            th, td {
                padding: 8px 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏭 服装加工厂计件管理系统</h1>
            <div class="current-date" id="currentDate"></div>
            <!-- 标签页导航 -->
            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('worker', event)">
                    👷 工人计件
                </button>
                <button class="tab-btn" onclick="switchTab('company', event)">
                    🏢 公司拿货
                </button>
                <button class="tab-btn" onclick="switchTab('workerManage', event)">
                    👥 工人管理
                </button>
            </div>
        </div>

        <div class="content">
            <!-- 工人计件界面 -->
            <div id="workerTab" class="tab-content active">
            <!-- 工人计件数据录入区 -->
            <div class="form-section">
                <h2>工人计件数据录入</h2>
                <form id="dataForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="workerName">工人姓名 *</label>
                            <select id="workerName" required>
                                <option value="">请选择工人</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="taskType">工序类型 *</label>
                            <select id="taskType" required>
                                <option value="">请选择工序</option>
                                <option value="锁边">锁边</option>
                                <option value="口袋">口袋</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="quantity">完成数量 *</label>
                            <input type="number" id="quantity" placeholder="请输入完成数量" min="1" required>
                        </div>
                        <div class="form-group">
                            <label for="unitPrice">单价（元/件）*</label>
                            <input type="number" id="unitPrice" placeholder="请输入单价" step="0.01" min="0" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="style">款式</label>
                            <input type="text" id="style" placeholder="请输入款式">
                        </div>
                        <div class="form-group">
                            <label for="date">日期 *</label>
                            <input type="date" id="date" required>
                        </div>
                    </div>
                    <div class="wage-display" id="wageDisplay">工资: ¥0.00</div>
                    <button type="submit" class="btn-submit">提交记录</button>
                </form>
            </div>

            <!-- 工人统计区 -->
            <div class="stats-section">
                <div class="stat-card">
                    <h3>📋 总记录数</h3>
                    <div class="stat-value" id="totalRecords">0</div>
                </div>
                <div class="stat-card">
                    <h3>👷 总工人数量</h3>
                    <div class="stat-value" id="totalWorkers">0</div>
                </div>
                <div class="stat-card">
                    <h3>📦 总计件数</h3>
                    <div class="stat-value" id="totalQuantity">0</div>
                </div>
                <div class="stat-card wage">
                    <h3>💰 总工资</h3>
                    <div class="stat-value" id="totalWage">¥0</div>
                </div>
            </div>

            <!-- 按工人统计 -->
            <div class="worker-stats">
                <h3>👷 按工人统计</h3>
                <div id="workerStatsList"></div>
            </div>

            <!-- 按工序统计 -->
            <div class="task-stats">
                <h3>🔧 按工序统计</h3>
                <div id="taskStatsList"></div>
            </div>

            <!-- 工人数据表格区 -->
            <div class="table-section">
                <h2>工人数据记录</h2>
                <div class="table-wrapper">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>款式</th>
                                <th>工人姓名</th>
                                <th>工序类型</th>
                                <th>数量</th>
                                <th>单价</th>
                                <th>工资</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                        </tbody>
                    </table>
                </div>
                <div id="emptyState" class="empty-state">
                    暂无数据记录
                </div>
            </div>

            <!-- 工人操作按钮区 -->
            <div class="action-buttons">
                <button class="btn-export" onclick="exportToCSV()">📊 导出工人Excel</button>
                <button class="btn-backup" onclick="backupData()">💾 备份数据</button>
                <button class="btn-restore" onclick="restoreData()">📥 恢复数据</button>
                <button class="btn-import" onclick="importCSV()">📋 导入CSV</button>
                <button class="btn-clear" onclick="clearAllData()">🗑️ 清空数据</button>
            </div>
            </div>

            <!-- ==================== 公司拿货记录区 ==================== -->

            <!-- 公司拿货界面 -->
            <div id="companyTab" class="tab-content">
            <!-- 公司拿货录入区 -->
            <div class="company-section">
                <h2>公司拿货记录</h2>
                <form id="companyForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="companyQuantity">拿货数量 *</label>
                            <input type="number" id="companyQuantity" placeholder="请输入拿货数量" min="1" required>
                        </div>
                        <div class="form-group">
                            <label for="companyPrice">公司单价（元/件）*</label>
                            <input type="number" id="companyPrice" placeholder="请输入公司单价" step="0.01" min="0" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="companyDate">日期 *</label>
                            <input type="date" id="companyDate" required>
                        </div>
                        <div class="form-group">
                            <label for="companyRemark">备注</label>
                            <input type="text" id="companyRemark" placeholder="请输入备注（可选）">
                        </div>
                    </div>
                    <div class="amount-display" id="amountDisplay">总金额: ¥0.00</div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="importFile" accept=".csv" style="display: none;">
    <input type="file" id="restoreFile" accept=".json" style="display: none;">

    <script>
        // 数据存储键名
        const STORAGE_KEY = 'clothing_piecework_data';
        const PRICES_KEY = 'clothing_piecework_prices';
        const COMPANY_DATA_KEY = 'clothing_company_data';
        const WORKERS_LIST_KEY = 'clothing_workers_list';

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initializeWorkersList();
            loadWorkerOptions();
            updateCurrentDate();
            setDefaultDate();
            setCompanyDefaultDate();
            loadData();
            loadCompanyData();
            updateStatistics();
            updateCompanyStatistics();
            setupEventListeners();
            setupFileHandlers();
            renderWorkerManageList();
        });

        // 设置事件监听
        function setupEventListeners() {
            // 工人计件 - 数量变化时更新工资显示
            document.getElementById('quantity').addEventListener('input', updateWageDisplay);

            // 工人计件 - 单价变化时更新工资显示
            document.getElementById('unitPrice').addEventListener('input', updateWageDisplay);

            // 公司拿货 - 数量变化时更新金额显示
            document.getElementById('companyQuantity').addEventListener('input', updateAmountDisplay);

            // 公司拿货 - 单价变化时更新金额显示
            document.getElementById('companyPrice').addEventListener('input', updateAmountDisplay);
        }

        // 标签页切换
        function switchTab(tabName, event) {
            // 隐藏所有标签页内容
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });

            // 移除所有标签按钮的激活状态
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 显示选中的标签页
            document.getElementById(tabName + 'Tab').classList.add('active');

            // 激活对应的标签按钮
            event.target.classList.add('active');
        }

        // 设置文件处理器
        function setupFileHandlers() {
            // CSV文件选择
            document.getElementById('importFile').addEventListener('change', handleImportFile);

            // JSON恢复文件选择
            document.getElementById('restoreFile').addEventListener('change', handleRestoreFile);
        }

        // 更新当前日期显示
        function updateCurrentDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', options);
        }

        // 设置默认日期为今天
        function setDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
        }

        // 设置公司拿货默认日期
        function setCompanyDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('companyDate').value = today;
        }

        // ========== 工人数据管理 ==========

        // 从localStorage加载数据
        function loadData() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        // 保存数据到localStorage
        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // 添加记录
        function addRecord(record) {
            const data = loadData();
            record.id = Date.now();
            data.push(record);
            saveData(data);
            return record;
        }

        // 删除记录
        function deleteRecord(id) {
            if (confirm('确定要删除这条记录吗？')) {
                let data = loadData();
                data = data.filter(record => record.id !== id);
                saveData(data);
                renderTable();
                updateStatistics();
                showToast('记录已删除');
            }
        }

        // 清空所有数据
        function clearAllData() {
            // 第一次确认
            if (!confirm('确定要清空所有工人数据吗？此操作不可恢复！')) {
                return;
            }

            // 第二次确认，需要输入"确定删除"
            const userInput = prompt('为防止误操作，请输入"确定删除"以确认清空所有数据：');
            if (userInput !== '确定删除') {
                showToast('已取消清空操作');
                return;
            }

            // 执行删除
            localStorage.removeItem(STORAGE_KEY);
            renderTable();
            updateStatistics();
            showToast('工人数据已清空');
        }

        // ========== 工资计算 ==========

        // 计算工资
        function calculateWage(quantity, unitPrice) {
            return quantity * unitPrice;
        }

        // 更新工资显示
        function updateWageDisplay() {
            const quantity = parseInt(document.getElementById('quantity').value) || 0;
            const unitPrice = parseFloat(document.getElementById('unitPrice').value) || 0;
            const wage = calculateWage(quantity, unitPrice);
            document.getElementById('wageDisplay').textContent = `工资: ¥${wage.toFixed(2)}`;
        }

        // ========== 工人表单提交 ==========

        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const workerName = document.getElementById('workerName').value;
            const taskType = document.getElementById('taskType').value;
            const quantity = parseInt(document.getElementById('quantity').value);
            const unitPrice = parseFloat(document.getElementById('unitPrice').value);
            const date = document.getElementById('date').value;
            const style = document.getElementById('style').value.trim();

            if (!workerName || !taskType || !quantity || !unitPrice || !date) {
                showToast('请填写所有必填项', true);
                return;
            }

            const wage = calculateWage(quantity, unitPrice);

            const record = {
                workerName,
                taskType,
                quantity,
                unitPrice,
                wage,
                date,
                style
            };

            addRecord(record);
            renderTable();
            updateStatistics();

            // 重置表单
            document.getElementById('workerName').value = '';
            document.getElementById('taskType').value = '';
            document.getElementById('quantity').value = '';
            document.getElementById('unitPrice').value = '';
            document.getElementById('style').value = '';
            updateWageDisplay();
            setDefaultDate();

            showToast('记录添加成功！');
        });

        // ========== 工人表格渲染 ==========

        function renderTable() {
            const data = loadData();
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');

            if (data.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            // 按日期降序排序
            const sortedData = [...data].sort((a, b) => new Date(b.date) - new Date(a.date));

            tbody.innerHTML = sortedData.map(record => `
                <tr>
                    <td>${record.date}</td>
                    <td>${record.style || '-'}</td>
                    <td>${record.workerName}</td>
                    <td>${record.taskType}</td>
                    <td>${record.quantity}</td>
                    <td class="unit-price-cell">¥${record.unitPrice.toFixed(2)}</td>
                    <td class="wage-cell">¥${record.wage.toFixed(2)}</td>
                    <td>
                        <button class="btn-delete" onclick="deleteRecord(${record.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        // ========== 工人统计功能 ==========

        function updateStatistics() {
            const data = loadData();

            // 总体统计
            document.getElementById('totalRecords').textContent = data.length;

            const uniqueWorkers = [...new Set(data.map(r => r.workerName))];
            document.getElementById('totalWorkers').textContent = uniqueWorkers.length;

            const totalQty = data.reduce((sum, r) => sum + r.quantity, 0);
            document.getElementById('totalQuantity').textContent = totalQty;

            const totalWage = data.reduce((sum, r) => sum + r.wage, 0);
            document.getElementById('totalWage').textContent = `¥${totalWage.toFixed(2)}`;

            // 按工人统计
            const workerStats = {};
            data.forEach(record => {
                if (!workerStats[record.workerName]) {
                    workerStats[record.workerName] = { quantity: 0, wage: 0 };
                }
                workerStats[record.workerName].quantity += record.quantity;
                workerStats[record.workerName].wage += record.wage;
            });

            const workerStatsList = document.getElementById('workerStatsList');
            if (Object.keys(workerStats).length === 0) {
                workerStatsList.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">暂无数据</p>';
            } else {
                workerStatsList.innerHTML = Object.entries(workerStats)
                    .sort((a, b) => b[1].wage - a[1].wage)
                    .map(([name, stats]) => `
                        <div class="worker-stat-item">
                            <span class="worker-name">${name}</span>
                            <div class="worker-details">
                                <span class="worker-total">${stats.quantity} 件</span>
                                <span class="worker-wage">¥${stats.wage.toFixed(2)}</span>
                            </div>
                        </div>
                    `).join('');
            }

            // 按工序统计
            const taskStats = {};
            data.forEach(record => {
                if (!taskStats[record.taskType]) {
                    taskStats[record.taskType] = { quantity: 0, wage: 0 };
                }
                taskStats[record.taskType].quantity += record.quantity;
                taskStats[record.taskType].wage += record.wage;
            });

            const taskStatsList = document.getElementById('taskStatsList');
            if (Object.keys(taskStats).length === 0) {
                taskStatsList.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">暂无数据</p>';
            } else {
                taskStatsList.innerHTML = Object.entries(taskStats)
                    .sort((a, b) => b[1].wage - a[1].wage)
                    .map(([type, stats]) => `
                        <div class="task-stat-item">
                            <span class="task-type">${type}</span>
                            <div class="task-details">
                                <span class="task-total">${stats.quantity} 件</span>
                                <span class="task-wage">¥${stats.wage.toFixed(2)}</span>
                            </div>
                        </div>
                    `).join('');
            }
        }

        // ========== 工人导出功能 ==========

        function exportToCSV() {
            const data = loadData();

            if (data.length === 0) {
                showToast('没有数据可以导出', true);
                return;
            }

            // 创建CSV内容
            const headers = ['日期', '款式', '工人姓名', '工序类型', '完成数量', '单价(元)', '工资(元)'];
            const rows = data.map(record => [
                record.date,
                record.style || '',
                record.workerName,
                record.taskType,
                record.quantity,
                record.unitPrice.toFixed(2),
                record.wage.toFixed(2)
            ]);

            let csvContent = '﻿';
            csvContent += headers.join(',') + '\n';
            csvContent += rows.map(row => row.join(',')).join('\n');

            // 创建下载链接
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);

            const today = new Date().toISOString().split('T')[0];
            link.setAttribute('href', url);
            link.setAttribute('download', `工人计件数据_${today}.csv`);
            link.style.visibility = 'hidden';

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showToast('工人数据导出成功！');
        }

        // ========== 公司拿货数据管理 ==========

        // 加载拿货数据
        function loadCompanyData() {
            const data = localStorage.getItem(COMPANY_DATA_KEY);
            return data ? JSON.parse(data) : [];
        }

        // 保存拿货数据
        function saveCompanyData(data) {
            localStorage.setItem(COMPANY_DATA_KEY, JSON.stringify(data));
        }

        // 添加拿货记录
        function addCompanyRecord(record) {
            const data = loadCompanyData();
            record.id = Date.now();
            record.totalAmount = record.quantity * record.companyPrice;
            data.push(record);
            saveCompanyData(data);
            return record;
        }

        // 删除拿货记录
        function deleteCompanyRecord(id) {
            if (confirm('确定要删除这条拿货记录吗？')) {
                let data = loadCompanyData();
                data = data.filter(record => record.id !== id);
                saveCompanyData(data);
                renderCompanyTable();
                updateCompanyStatistics();
                showToast('拿货记录已删除');
            }
        }

        // 清空拿货数据
        function clearCompanyData() {
            // 第一次确认
            if (!confirm('确定要清空所有拿货数据吗？此操作不可恢复！')) {
                return;
            }

            // 第二次确认，需要输入"确定删除"
            const userInput = prompt('为防止误操作，请输入"确定删除"以确认清空所有数据：');
            if (userInput !== '确定删除') {
                showToast('已取消清空操作');
                return;
            }

            // 执行删除
            localStorage.removeItem(COMPANY_DATA_KEY);
            renderCompanyTable();
            updateCompanyStatistics();
            showToast('拿货数据已清空');
        }

        // 更新总金额显示
        function updateAmountDisplay() {
            const quantity = parseInt(document.getElementById('companyQuantity').value) || 0;
            const companyPrice = parseFloat(document.getElementById('companyPrice').value) || 0;
            const totalAmount = quantity * companyPrice;
            document.getElementById('amountDisplay').textContent = `总金额: ¥${totalAmount.toFixed(2)}`;
        }

        // ========== 公司拿货表单提交 ==========

        document.getElementById('companyForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const quantity = parseInt(document.getElementById('companyQuantity').value);
            const companyPrice = parseFloat(document.getElementById('companyPrice').value);
            const date = document.getElementById('companyDate').value;

        // ========== 公司拿货表格渲染 ==========

        function renderCompanyTable() {

        // ========== 公司拿货统计功能 ==========

        function updateCompanyStatistics() {
            const data = loadCompanyData();

            // 总体统计
            document.getElementById('companyTotalBatches').textContent = data.length;

            const totalQuantity = data.reduce((sum, r) => sum + r.quantity, 0);

                showToast('没有拿货数据可以导出', true);
                return;
            }

            // 创建CSV内容
            const headers = ['拿货数量', '公司单价(元)', '日期', '备注', '总金额(元)'];
            const rows = data.map(record => [
                record.quantity,
                record.companyPrice.toFixed(2),

            ]);

            const today = new Date().toISOString().split('T')[0];
            link.setAttribute('href', url);
            link.setAttribute('download', `公司拿货数据_${today}.csv`);

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showToast('拿货数据导出成功！');

        // ========== 备份/恢复功能 ==========

        // 备份数据（导出JSON）
        function backupData() {
            const workerData = loadData();
            const companyData = loadCompanyData();
            const prices = loadPrices();

            const backup = {
                version: '2.0',
                exportDate: new Date().toISOString(),
                prices: prices,
                workerRecords: workerData,
                companyRecords: companyData
            };

            const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);

            const today = new Date().toISOString().split('T')[0];
            link.setAttribute('href', url);
            link.setAttribute('download', `计件系统_完整备份_${today}.json`);
            link.style.visibility = 'hidden';

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showToast('数据备份成功！');
        }

        // 恢复数据（导入JSON）
        function restoreData() {
            // 使用HTML5文件选择器（在Cordova中也支持）
            document.getElementById('restoreFile').click();
        }

        function handleRestoreFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function(e) {
                try {
                    const backup = JSON.parse(e.target.result);

                    // 恢复单价配置
                    if (backup.prices) {
                        localStorage.setItem(PRICES_KEY, JSON.stringify(backup.prices));
                        if (typeof loadPricesConfig === 'function') {
                            loadPricesConfig();
                        }
                    }

                    // 恢复工人记录数据
                    let workerRecords = [];
                    if (backup.workerRecords && backup.workerRecords.length > 0) {
                        workerRecords = backup.workerRecords;
                    } else if (backup.records && backup.records.length > 0) {
                        // 兼容旧版本
                        workerRecords = backup.records;
                    }

                    // 恢复公司拿货数据
                    let companyRecords = [];
                    if (backup.companyRecords && backup.companyRecords.length > 0) {
                        companyRecords = backup.companyRecords;
                    }

                    // 询问恢复模式
                    if (workerRecords.length > 0 || companyRecords.length > 0) {
                        importWithModeSelection(workerRecords, companyRecords);
                    } else {
                        showToast('备份文件中没有记录数据', true);
                    }
                } catch (error) {
                    showToast('文件格式错误，请选择正确的备份文件', true);
                }

                event.target.value = '';
            };

            reader.readAsText(file);
        }

        // ========== CSV导入功能 ==========

        // 导入CSV
        function importCSV() {
            // 使用HTML5文件选择器（在Cordova中也支持）
            document.getElementById('importFile').click();
        }

        function handleImportFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function(e) {
                try {
                    const data = parseCSV(e.target.result);
                    if (data.length > 0) {
                        importWithModeSelection(data, []);
                    } else {
                        showToast('CSV文件中没有有效数据', true);
                    }
                } catch (error) {
                    showToast('CSV文件格式错误', true);
                }

                event.target.value = '';
            };

            reader.readAsText(file);
        }

        // 解析CSV
        function parseCSV(csvContent) {
            const lines = csvContent.split('\n').filter(line => line.trim());
            if (lines.length < 2) return [];

            const headers = lines[0].split(',').map(h => h.trim());
            const hasStyle = headers.includes('款式');
            const hasPriceAndWage = headers.length >= (hasStyle ? 7 : 6);

            const records = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',').map(c => c.trim());
                if (cols.length < 4) continue;

                let record;
                if (hasPriceAndWage && hasStyle) {
                    // 新格式：日期,款式,工人姓名,工序类型,完成数量,单价,工资
                    record = {
                        date: cols[0],
                        style: cols[1],
                        workerName: cols[2],
                        taskType: cols[3],
                        quantity: parseInt(cols[4]) || 0,
                        unitPrice: parseFloat(cols[5]) || 0,
                        wage: parseFloat(cols[6]) || 0
                    };
                } else if (hasPriceAndWage) {
                    // 旧格式：日期,工人姓名,工序类型,完成数量,单价,工资
                    record = {
                        date: cols[0],
                        style: '',
                        workerName: cols[1],
                        taskType: cols[2],
                        quantity: parseInt(cols[3]) || 0,
                        unitPrice: parseFloat(cols[4]) || 0,
                        wage: parseFloat(cols[5]) || 0
                    };
                } else {
                    const taskType = cols[hasStyle ? 3 : 2];
                    const quantity = parseInt(cols[hasStyle ? 4 : 3]) || 0;
                    const unitPrice = getUnitPrice(taskType);

                    record = {
                        date: cols[0],
                        style: hasStyle ? cols[1] : '',
                        workerName: cols[hasStyle ? 2 : 1],
                        taskType: taskType,
                        quantity: quantity,
                        unitPrice: unitPrice,
                        wage: calculateWage(quantity, unitPrice)
                    };
                }

                record.id = Date.now() + i;
                records.push(record);
            }

            return records;
        }

        // ========== 导入模式选择 ==========

        // 导入时让用户选择模式
        function importWithModeSelection(newWorkerData, newCompanyData) {
            const isAppend = confirm(
                '📥 数据导入\n\n' +
                '点击【确定】- 追加模式：保留现有数据，导入的数据添加到后面\n' +
                '点击【取消】- 覆盖模式：清空现有数据，只保留导入的数据'
            );

            if (isAppend) {
                // 追加模式
                if (newWorkerData.length > 0) {
                    const existingWorkerData = loadData();
                    const mergedWorker = [...existingWorkerData, ...newWorkerData];
                    saveData(mergedWorker);
                }

                if (newCompanyData.length > 0) {
                    const existingCompanyData = loadCompanyData();
                    const mergedCompany = [...existingCompanyData, ...newCompanyData];
                    saveCompanyData(mergedCompany);
                }

                showToast('成功追加导入数据！');
            } else {
                // 覆盖模式
                if (confirm('⚠️ 确定要覆盖所有数据吗？此操作不可恢复！')) {
                    if (newWorkerData.length > 0) {
                        saveData(newWorkerData);
                    }

                    if (newCompanyData.length > 0) {
                        saveCompanyData(newCompanyData);
                    }

                    showToast('成功覆盖导入数据！');
                } else {
                    showToast('已取消导入');
                    return;
                }
            }

            renderTable();
            updateStatistics();
            renderCompanyTable();
            updateCompanyStatistics();
        }

        // ========== 提示信息 ==========

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            if (isError) {
                toast.classList.add('error');
            }

            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        // ========== 工人名单管理 ==========

        // 初始化工人名单
        function initializeWorkersList() {
            const existing = localStorage.getItem(WORKERS_LIST_KEY);
            if (!existing) {
                const defaultWorkers = ['欧阳', '丽芬', '玉新', '美满', '丽秀', '丽昌', '美蓉'];
                localStorage.setItem(WORKERS_LIST_KEY, JSON.stringify(defaultWorkers));
            }
        }

        // 加载工人名单
        function loadWorkersList() {
            const data = localStorage.getItem(WORKERS_LIST_KEY);
            return data ? JSON.parse(data) : [];
        }

        // 保存工人名单
        function saveWorkersList(list) {
            localStorage.setItem(WORKERS_LIST_KEY, JSON.stringify(list));
        }

        // 动态加载工人下拉框选项
        function loadWorkerOptions() {
            const workers = loadWorkersList();
            const select = document.getElementById('workerName');
            select.innerHTML = '<option value="">请选择工人</option>';
            workers.forEach(w => {
                const option = document.createElement('option');
                option.value = w;
                option.textContent = w;
                select.appendChild(option);
            });
        }

        // 渲染工人管理列表
        function renderWorkerManageList() {
            const workers = loadWorkersList();
            const tbody = document.getElementById('workerManageTableBody');
            const emptyState = document.getElementById('workerManageEmptyState');
            const totalCount = document.getElementById('totalWorkersCount');

            // 更新统计
            totalCount.textContent = workers.length;

            if (workers.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            tbody.innerHTML = workers.map((worker, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${worker}</td>
                    <td>
                        <button class="btn-delete" onclick="deleteWorker('${worker}')">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        // 添加工人
        function addWorker(name) {
            const list = loadWorkersList();
            if (list.includes(name)) {
                showToast('该工人已存在', true);
                return false;
            }
            list.push(name);
            saveWorkersList(list);
            return true;
        }

        // 删除工人
        function deleteWorker(name) {
            if (confirm(`确定要删除工人"${name}"吗？`)) {
                const list = loadWorkersList();
                const newList = list.filter(w => w !== name);
                saveWorkersList(newList);
                renderWorkerManageList();
                loadWorkerOptions();
                showToast(`工人"${name}"已删除`);
            }
        }

        // 工人管理表单提交
        document.getElementById('workerManageForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('newWorkerName').value.trim();

            if (!name) {
                showToast('请输入工人姓名', true);
                return;
            }

            if (addWorker(name)) {
                document.getElementById('newWorkerName').value = '';
                renderWorkerManageList();
                loadWorkerOptions();
                showToast(`工人"${name}"添加成功！`);
            }
        });

        // ========== Cordova文件下载支持 ==========

        // 检测是否在Cordova环境中
        function isCordovaEnvironment() {
            return typeof window.cordova !== 'undefined' && window.cordova.platformId;
        }

        // 请求存储权限（Android 6-10需要）
        function requestStoragePermission() {
            return new Promise((resolve, reject) => {
                if (!isCordovaEnvironment()) {
                    resolve(false); // 非Cordova环境
                    return;
                }

                const permissions = window.cordova.plugins.permissions;
                if (!permissions) {
                    console.log('权限插件未安装，使用应用内部存储');
                    resolve(false); // 插件未安装，使用默认路径
                    return;
                }

                // Android 11+不需要存储权限
                if (window.device && window.device.version) {
                    const androidVersion = parseInt(window.device.version.split('.').slice(0, 2).join(''));
                    if (androidVersion >= 30) { // Android 11 (API 30)
                        console.log('Android 11+，不需要存储权限');
                        resolve(true);
                        return;
                    }
                }

                // Android 6-10需要请求权限
                permissions.requestPermission(permissions.WRITE_EXTERNAL_STORAGE, (status) => {
                    if (status.hasPermission) {
                        console.log('存储权限已授予');
                        resolve(true);
                    } else {
                        console.log('存储权限被拒绝，使用应用内部存储');
                        resolve(false); // 使用应用内部存储
                    }
                }, (error) => {
                    console.log('权限请求失败，使用应用内部存储:', error);
                    resolve(false); // 失败时使用应用内部存储
                });
            });
        }

        // Cordova文件下载函数
        function downloadFileCordova(content, filename, mimeType) {
            return new Promise(async (resolve, reject) => {
                try {
                    // 请求权限（如果需要）
                    try {
                        await requestStoragePermission();
                    } catch (permError) {
                        console.log('权限请求失败，使用默认路径:', permError);
                        // 继续执行，使用应用内部存储
                    }

                    // 等待文件系统就绪
                    if (!window.cordova || !window.cordova.file) {
                        reject(new Error('Cordova文件系统未就绪'));
                        return;
                    }

                    // 获取可访问的存储路径
                    const paths = window.cordova.file;
                    const downloadPath = paths.externalDataDirectory ||
                                     paths.cacheDirectory ||
                                     paths.dataDirectory;

                    // 完整文件路径
                    const fullPath = downloadPath + filename;

                    // 写入文件
                    window.resolveLocalFileSystemURL(downloadPath, (dirEntry) => {
                        dirEntry.getFile(filename, { create: true, exclusive: false }, (fileEntry) => {
                            fileEntry.createWriter((writer) => {
                                writer.onwriteend = () => {
                                    const fileURL = fileEntry.toURL();
                                    console.log('文件写入成功:', fullPath);
                                    resolve({ success: true, filePath: fullPath, fileURL: fileURL });
                                };

                                writer.onerror = (error) => {
                                    console.error('文件写入错误:', error);
                                    reject(new Error('文件写入失败'));
                                };

                                // 将内容转换为Blob并写入
                                const blob = new Blob([content], { type: mimeType });
                                writer.write(blob);
                            }, (error) => {
                                console.error('创建文件失败:', error);
                                reject(new Error('创建文件失败'));
                            });
                        }, (error) => {
                            console.error('获取文件失败:', error);
                            reject(new Error('获取文件失败'));
                        });
                    }, (error) => {
                        console.error('解析路径失败:', error);
                        reject(new Error('解析路径失败'));
                    });
                } catch (error) {
                    console.error('下载过程错误:', error);
                    reject(error);
                }
            });
        }

        // 浏览器环境下载（后备方案）
        function downloadFileBrowser(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);

            link.setAttribute('href', url);
            link.setAttribute('download', filename);
            link.style.visibility = 'hidden';

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            setTimeout(() => URL.revokeObjectURL(url), 100);
            return Promise.resolve({ success: true, method: 'browser' });
        }

        // 统一的文件下载函数
        function downloadFile(content, filename, mimeType = 'text/csv;charset=utf-8;') {
            if (isCordovaEnvironment()) {
                return downloadFileCordova(content, filename, mimeType);
            } else {
                return downloadFileBrowser(content, filename, mimeType);
            }
        }

        // 覆盖原有的导出CSV函数
        const originalExportToCSV = window.exportToCSV;
        window.exportToCSV = function() {
            const data = loadData();

            if (data.length === 0) {
                showToast('没有数据可以导出', true);
                return;
            }

            // 创建CSV内容
            const headers = ['日期', '款式', '工人姓名', '工序类型', '完成数量', '单价(元)', '工资(元)'];
            const rows = data.map(record => [
                record.date,
                record.style || '',
                record.workerName,
                record.taskType,
                record.quantity,
                record.unitPrice.toFixed(2),
                record.wage.toFixed(2)
            ]);

            let csvContent = '﻿'; // UTF-8 BOM
            csvContent += headers.join(',') + '\n';
            csvContent += rows.map(row => row.join(',')).join('\n');

            const today = new Date().toISOString().split('T')[0];
            const filename = `工人计件数据_${today}.csv`;

            downloadFile(csvContent, filename, 'text/csv;charset=utf-8;')
                .then(result => {
                    if (result.success) {
                        if (result.filePath) {
                            showToast(`✅ 导出成功！文件已保存到: ${filename}`);
                        } else {
                            showToast('✅ 工人数据导出成功！');
                        }
                    }
                })
                .catch(error => {
                    showToast('❌ 导出失败: ' + error.message, true);
                    console.error('导出错误:', error);
                });
        };

        // 覆盖原有的公司拿货导出函数
        const originalExportCompanyData = window.exportCompanyData;
        window.exportCompanyData = function() {
            const data = loadCompanyData();

            if (data.length === 0) {
                showToast('没有拿货数据可以导出', true);
                return;
            }

            // 创建CSV内容
            const headers = ['拿货数量', '公司单价(元)', '日期', '备注', '总金额(元)'];
            const rows = data.map(record => [
                record.quantity,
                record.companyPrice.toFixed(2),
                record.date,
                record.remark || '',
                record.totalAmount.toFixed(2)
            ]);

            let csvContent = '﻿'; // UTF-8 BOM
            csvContent += headers.join(',') + '\n';
            csvContent += rows.map(row => row.join(',')).join('\n');

            const today = new Date().toISOString().split('T')[0];
            const filename = `公司拿货数据_${today}.csv`;

            downloadFile(csvContent, filename, 'text/csv;charset=utf-8;')
                .then(result => {
                    if (result.success) {
                        if (result.filePath) {
                            showToast(`✅ 导出成功！文件已保存到: ${filename}`);
                        } else {
                            showToast('✅ 拿货数据导出成功！');
                        }
                    }
                })
                .catch(error => {
                    showToast('❌ 导出失败: ' + error.message, true);
                    console.error('导出错误:', error);
                });
        };

        // 覆盖原有的备份数据函数
        const originalBackupData = window.backupData;
        window.backupData = function() {
            const workerData = loadData();
            const companyData = loadCompanyData();
            const prices = typeof loadPrices === 'function' ? loadPrices() : {};

            const backup = {
                version: '2.0',
                exportDate: new Date().toISOString(),
                prices: prices,
                workerRecords: workerData,
                companyRecords: companyData
            };

            const content = JSON.stringify(backup, null, 2);
            const today = new Date().toISOString().split('T')[0];
            const filename = `计件系统_完整备份_${today}.json`;

            downloadFile(content, filename, 'application/json')
                .then(result => {
                    if (result.success) {
                        if (result.filePath) {
                            showToast(`✅ 备份成功！文件已保存到: ${filename}`);
                        } else {
                            showToast('✅ 数据备份成功！');
                        }
                    }
                })
                .catch(error => {
                    showToast('❌ 备份失败: ' + error.message, true);
                    console.error('备份错误:', error);
                });
        };

        // 等待设备就绪（Cordova环境）
        if (isCordovaEnvironment()) {
            document.addEventListener('deviceready', () => {
                console.log('Cordova设备已就绪，平台:', window.cordova.platformId);
                console.log('文件系统路径:', window.cordova.file);
            }, false);
        }
    </script>
