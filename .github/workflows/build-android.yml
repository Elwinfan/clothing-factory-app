name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Install dependencies
      run: npm install

    - name: Add Android Platform
      run: cordova platform add android

    - name: Build APK (Debug)
      run: cordova build android

    - name: Rename APK
      run: |
        mkdir -p artifacts
        cp platforms/android/app/build/outputs/apk/debug/app-debug.apk artifacts/服装加工厂-v1.0.0-debug.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: artifacts/服装加工厂-v1.0.0-debug.apk
        retention-days: 30

    - name: Create Release (if tagged)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/服装加工厂-v1.0.0-debug.apk
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build summary
      run: |
        echo "## 🎉 构建成功！" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 APK信息" >> $GITHUB_STEP_SUMMARY
        echo "- **版本**: v1.0.0" >> $GITHUB_STEP_SUMMARY
        echo "- **类型**: Debug" >> $GITHUB_STEP_SUMMARY
        echo "- **文件名**: 服装加工厂-v1.0.0-debug.apk" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📥 下载方式" >> $GITHUB_STEP_SUMMARY
        echo "1. 从上方的Artifacts中下载" >> $GITHUB_STEP_SUMMARY
        echo "2. 或者在Releases页面下载（如果推送了tag）" >> $GITHUB_STEP_SUMMARY
